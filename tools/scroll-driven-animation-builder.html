<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel — The Scroll-Timeline Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700&family=Overpass+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --dark: #0f1014;
        --dark2: #16181d;
        --dark3: #1d1f25;
        --line: #32363f;
        --line-soft: #24262b;
        --cream: #f2ede4;
        --cream-dim: #a3a7ad;
        --amber: #f09f41;
        --amber-bright: #ffc67b;
        --amber-glow: rgba(240, 159, 65, 0.25);
        --red: #da654e;
        --red-glow: rgba(218, 101, 78, 0.25);
        --teal: #58c2b0;
        --teal-glow: rgba(88, 194, 176, 0.25);
        --good: #85c272;
        --good-glow: rgba(133, 194, 114, 0.2);
        --font-display: "Instrument Serif", serif;
        --font-ui: "Archivo", sans-serif;
        --font-mono: "Overpass Mono", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--dark);
      }
      body {
        background: radial-gradient(circle at 15% 0%, rgba(88, 194, 176, 0.08) 0%, transparent 45%), radial-gradient(circle at 85% 15%, rgba(240, 159, 65, 0.08) 0%, transparent 45%), linear-gradient(180deg, var(--dark2) 0%, var(--dark) 100%);
        color: var(--cream);
        font-family: var(--font-ui);
        min-height: 100vh;
        line-height: 1.65;
      }
      button,
      input,
      select,
      textarea {
        font-family: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        background: none;
        border: none;
      }
      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--amber-bright);
        outline-offset: 2px;
      }
      ::selection {
        background: var(--amber-glow);
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 40px 26px 90px;
      }

      .title-card {
        position: relative;
        text-align: center;
        padding: 44px 36px 40px;
        margin-bottom: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: radial-gradient(ellipse at top right, rgba(240, 159, 65, 0.08) 0%, transparent 60%), linear-gradient(160deg, var(--dark3), var(--dark2));
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }
      .title-card::before,
      .title-card::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 26px;
        background-image: radial-gradient(circle, var(--dark) 5px, transparent 5.5px);
        background-size: 26px 30px;
        background-repeat: repeat-y;
        background-position: center 6px;
      }
      .title-card::before {
        left: 0;
      }
      .title-card::after {
        right: 0;
      }
      .reel-name {
        font-family: var(--font-display);
        font-style: italic;
        font-size: clamp(30px, 5.6vw, 50px);
        color: var(--amber-bright);
        text-shadow: 0 0 24px var(--amber-glow);
      }
      .reel-sub {
        font-family: var(--font-mono);
        font-size: 10.5px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--cream-dim);
        margin-top: 9px;
      }
      .reel-tagline {
        max-width: 620px;
        margin: 18px auto 0;
        font-size: 14px;
        color: var(--cream-dim);
        line-height: 1.85;
      }
      .reel-tagline code {
        font-family: var(--font-mono);
        background: var(--amber-glow);
        color: var(--amber-bright);
        padding: 1px 7px;
        border-radius: 4px;
        font-size: 12.5px;
      }
      .support-flag {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin-top: 16px;
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid var(--line);
      }
      .support-flag.ok {
        border-color: var(--good);
        color: var(--good);
        background: var(--good-glow);
      }
      .support-flag.no {
        border-color: var(--red);
        color: var(--red);
        background: var(--red-glow);
      }
      .support-flag svg {
        width: 12px;
        height: 12px;
      }

      .mode-clapper {
        display: flex;
        justify-content: center;
        gap: 3px;
        margin-bottom: 22px;
      }
      .mode-tab {
        padding: 12px 26px;
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 12.5px;
        color: var(--cream-dim);
        background: var(--dark3);
        border: 1.5px solid var(--line);
        border-radius: 6px 6px 0 0;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .mode-tab.active {
        color: var(--dark);
        background: var(--amber-bright);
        border-color: var(--amber-bright);
      }
      .mode-tab:hover:not(.active) {
        color: var(--amber-bright);
      }

      .presets-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .preset-can {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
        padding: 13px 16px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--dark3);
        min-width: 96px;
        transition: all 0.2s ease;
      }
      .preset-can:hover {
        transform: translateY(-3px);
        border-color: var(--amber);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
      }
      .preset-can.active {
        border-color: var(--amber-bright);
        background: linear-gradient(160deg, var(--amber-glow), transparent);
      }
      .preset-can svg {
        width: 22px;
        height: 22px;
        color: var(--amber-bright);
      }
      .preset-can span {
        font-size: 10.5px;
        font-weight: 600;
        text-align: center;
        color: var(--cream-dim);
      }
      .preset-can.active span {
        color: var(--amber-bright);
      }

      .workbench {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 26px;
        align-items: start;
        margin-bottom: 30px;
      }
      @media (max-width: 980px) {
        .workbench {
          grid-template-columns: 1fr;
        }
      }

      .filmstrip-panel {
        background: var(--dark3);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .panel-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .panel-heading h2 {
        font-family: var(--font-display);
        font-style: italic;
        font-size: 22px;
        color: var(--cream);
      }
      .panel-heading .sub-note {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--cream-dim);
      }

      .filmstrip {
        position: relative;
        height: 120px;
        border-radius: 6px;
        overflow: visible;
        background: linear-gradient(180deg, #07080a, #0c0e12);
        border: 1px solid var(--line-soft);
      }
      .sprocket-row {
        position: absolute;
        left: 0;
        right: 0;
        height: 14px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: #050608;
      }
      .sprocket-row.top {
        top: 0;
        border-radius: 6px 6px 0 0;
      }
      .sprocket-row.bottom {
        bottom: 0;
        border-radius: 0 0 6px 6px;
      }
      .sprocket-hole {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--dark);
      }
      .track-area {
        position: absolute;
        top: 14px;
        bottom: 14px;
        left: 20px;
        right: 20px;
      }
      .track-line {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 2px;
        background: var(--line);
        border-radius: 2px;
        transform: translateY(-1px);
      }
      .range-band {
        position: absolute;
        top: 22%;
        bottom: 22%;
        background: var(--teal-glow);
        border-left: 2px solid var(--teal);
        border-right: 2px solid var(--teal);
        border-radius: 3px;
      }
      .range-label {
        position: absolute;
        top: -19px;
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--teal);
        white-space: nowrap;
      }
      .frame-marker {
        position: absolute;
        top: 50%;
        width: 30px;
        height: 40px;
        transform: translate(-50%, -50%);
        border-radius: 4px;
        background: linear-gradient(160deg, #ffffff, #e5d9c5);
        border: 2px solid var(--dark);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 9.5px;
        color: var(--dark);
        font-weight: 600;
        z-index: 2;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .frame-marker.selected {
        border-color: var(--amber-bright);
        box-shadow: 0 0 0 3px var(--amber-glow);
      }
      .filmstrip-hint {
        font-size: 11.5px;
        color: var(--cream-dim);
        font-style: italic;
        text-align: center;
        margin-top: 13px;
      }
      .filmstrip-hint b {
        color: var(--amber-bright);
        font-style: normal;
      }
      .frame-controls {
        display: flex;
        justify-content: center;
        gap: 9px;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      .frame-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 15px;
        border: 1px solid var(--line);
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--cream-dim);
        transition: all 0.15s;
      }
      .frame-btn:hover {
        border-color: var(--amber);
        color: var(--amber-bright);
        background: var(--amber-glow);
      }
      .frame-btn svg {
        width: 13px;
        height: 13px;
      }
      .frame-btn.danger:hover {
        border-color: var(--red);
        color: var(--red);
        background: var(--red-glow);
      }
      .frame-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        background: none;
        border-color: var(--line);
        color: var(--cream-dim);
      }

      .frame-editor {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px dashed var(--line);
      }
      .frame-editor-title {
        font-family: var(--font-mono);
        font-size: 10.5px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--amber-bright);
        margin-bottom: 13px;
      }
      .prop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
      }
      .prop-field label {
        display: block;
        font-size: 10.5px;
        color: var(--cream-dim);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .prop-field input[type="range"] {
        width: 100%;
        accent-color: var(--amber);
      }
      .prop-field .val {
        font-family: var(--font-mono);
        color: var(--amber-bright);
        font-size: 11.5px;
        float: right;
      }

      .range-controls {
        display: flex;
        gap: 16px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .range-stepper-group {
        flex: 1;
        min-width: 150px;
      }
      .range-stepper-group label {
        display: block;
        font-size: 10.5px;
        color: var(--cream-dim);
        margin-bottom: 7px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 1px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        width: fit-content;
      }
      .stepper button {
        width: 26px;
        height: 28px;
        display: grid;
        place-items: center;
        color: var(--cream-dim);
        font-size: 15px;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .stepper button:hover {
        background: var(--amber-glow);
        color: var(--amber-bright);
      }
      .stepper span {
        width: 48px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--cream);
      }

      .viewer-panel {
        background: var(--dark3);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 20px;
        position: sticky;
        top: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .viewer-frame {
        position: relative;
        height: 400px;
        border-radius: 8px;
        overflow: hidden;
        border: 3px solid var(--dark);
        background: #07080a;
      }
      .viewer-scroll {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .viewer-scroll::-webkit-scrollbar {
        width: 7px;
      }
      .viewer-scroll::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 4px;
      }
      .viewer-track {
        padding: 18px;
      }
      .viewer-progress-track {
        position: sticky;
        top: 0;
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        margin-bottom: 22px;
        z-index: 5;
      }
      .viewer-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--teal), var(--amber));
        border-radius: 3px;
      }
      .viewer-spacer {
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--cream-dim);
        opacity: 0.55;
        text-align: center;
        padding: 0 20px;
      }
      .viewer-subject-wrap {
        height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .viewer-subject {
        width: 140px;
        height: 140px;
        border-radius: 14px;
        background: conic-gradient(from 180deg, var(--teal), var(--amber), var(--red), var(--teal));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-style: italic;
        font-size: 18px;
        color: #180f05;
        text-align: center;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      }
      .viewer-bar-wrap {
        width: 100%;
        height: 14px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        overflow: hidden;
      }
      .viewer-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--red), var(--amber));
        border-radius: 8px;
      }
      .viewer-note {
        font-size: 11px;
        color: var(--cream-dim);
        text-align: center;
        margin-top: 13px;
        line-height: 1.7;
        font-style: italic;
      }
      .viewer-note b {
        color: var(--amber-bright);
        font-style: normal;
      }
      .viewer-actions {
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }
      .rewind-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--amber-bright);
        border: 1px solid var(--amber);
        padding: 7px 15px;
        border-radius: 20px;
        transition: all 0.15s;
      }
      .rewind-btn:hover {
        background: var(--amber-glow);
      }
      .rewind-btn svg {
        width: 13px;
        height: 13px;
      }

      .tray-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 22px;
      }
      @media (max-width: 900px) {
        .tray-grid {
          grid-template-columns: 1fr;
        }
      }
      .code-tray {
        background: #0a0c10;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .tray-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      .tray-head span {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 10.5px;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: var(--cream-dim);
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--teal);
        border: 1px solid var(--teal);
        padding: 6px 13px;
        border-radius: 20px;
        transition: all 0.15s;
      }
      .copy-btn:hover {
        background: var(--teal-glow);
      }
      .copy-btn.copied {
        border-color: var(--good);
        color: var(--good);
      }
      .copy-btn svg {
        width: 12px;
        height: 12px;
      }
      pre.code-out {
        padding: 17px 19px;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.8;
        color: #e5d8bc;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        max-height: 380px;
        overflow-y: auto;
      }
      .code-out .at {
        color: var(--amber-bright);
      }
      .code-out .sel {
        color: var(--teal);
      }
      .code-out .prop {
        color: var(--amber-bright);
      }
      .code-out .val {
        color: #efe3c8;
      }
      .code-out .brace {
        color: var(--cream-dim);
      }
      .code-out .cmt {
        color: #7a6a4d;
        font-style: italic;
      }

      .concept-tray {
        background: var(--dark3);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 19px 21px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .concept-tray h3 {
        font-family: var(--font-display);
        font-style: italic;
        font-size: 20px;
        color: var(--amber-bright);
        margin-bottom: 13px;
        text-align: center;
      }
      .concept-row {
        display: flex;
        gap: 11px;
        margin-bottom: 13px;
      }
      .concept-row:last-child {
        margin-bottom: 0;
      }
      .concept-row svg {
        width: 18px;
        height: 18px;
        color: var(--teal);
        flex-shrink: 0;
        margin-top: 2px;
      }
      .concept-row b {
        display: block;
        font-size: 12.5px;
        color: var(--cream);
        margin-bottom: 3px;
      }
      .concept-row p {
        font-size: 12px;
        color: var(--cream-dim);
        line-height: 1.6;
      }
      .concept-row code {
        font-family: var(--font-mono);
        background: var(--teal-glow);
        color: var(--teal);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 11px;
      }

      .footer-note {
        text-align: center;
        font-size: 11.5px;
        color: var(--cream-dim);
        margin-top: 20px;
        line-height: 1.8;
      }
      .footer-note b {
        color: var(--amber-bright);
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const I = {
        check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l6 6L20 6"/></svg>`,
        copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>`,
        plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
        trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>`,
        parallax: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="6" y="14" width="12" height="6" rx="1.5"/></svg>`,
        fade: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8" stroke-dasharray="3 3"/></svg>`,
        progress: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 12h12M3 12l4-4M3 12l4 4"/><path d="M17 12h4"/></svg>`,
        rotate: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 12a8 8 0 1 0 3-6.2"/><path d="M4 4v5h5"/></svg>`,
        scale: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="8" y="8" width="8" height="8"/><path d="M3 3l5 5M21 3l-5 5M3 21l5-5M21 21l-5-5"/></svg>`,
        eye: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`
      };

      const PRESETS = {
        reveal: {
          label: "Fade Reveal",
          icon: I.fade,
          mode: "view",
          frames: [
            { id: "f1", pct: 0, props: { opacity: 0, ty: 40, scale: 96, rotate: 0 } },
            { id: "f2", pct: 100, props: { opacity: 100, ty: 0, scale: 100, rotate: 0 } }
          ],
          range: { start: 0, end: 55 }
        },
        parallax: {
          label: "Parallax Drift",
          icon: I.parallax,
          mode: "scroll",
          frames: [
            { id: "f1", pct: 0, props: { opacity: 100, ty: -50, scale: 100, rotate: 0 } },
            { id: "f2", pct: 100, props: { opacity: 100, ty: 50, scale: 100, rotate: 0 } }
          ],
          range: { start: 0, end: 100 }
        },
        progress: {
          label: "Progress Bar",
          icon: I.progress,
          mode: "scroll",
          frames: [
            { id: "f1", pct: 0, props: { opacity: 100, ty: 0, scale: 100, rotate: 0, width: 0 } },
            { id: "f2", pct: 100, props: { opacity: 100, ty: 0, scale: 100, rotate: 0, width: 100 } }
          ],
          range: { start: 0, end: 100 }
        },
        spin: {
          label: "Rotate Spin",
          icon: I.rotate,
          mode: "view",
          frames: [
            { id: "f1", pct: 0, props: { opacity: 35, ty: 0, scale: 78, rotate: -22 } },
            { id: "f2", pct: 50, props: { opacity: 100, ty: 0, scale: 100, rotate: 0 } },
            { id: "f3", pct: 100, props: { opacity: 35, ty: 0, scale: 78, rotate: 22 } }
          ],
          range: { start: 0, end: 100 }
        },
        pop: {
          label: "Scale Pop",
          icon: I.scale,
          mode: "view",
          frames: [
            { id: "f1", pct: 0, props: { opacity: 0, ty: 0, scale: 55, rotate: 0 } },
            { id: "f2", pct: 55, props: { opacity: 100, ty: 0, scale: 110, rotate: 0 } },
            { id: "f3", pct: 100, props: { opacity: 100, ty: 0, scale: 100, rotate: 0 } }
          ],
          range: { start: 0, end: 60 }
        }
      };

      let state = null;
      function freshStateFromPreset(key) {
        const p = PRESETS[key];
        return {
          presetKey: key,
          mode: p.mode,
          frames: p.frames.map((f) => ({ ...f, props: { ...f.props } })),
          selectedFrameId: p.frames[0].id,
          range: { ...p.range },
          copied: false
        };
      }
      state = freshStateFromPreset("reveal");

      const SUPPORTS_SCROLL_TIMELINE = typeof CSS !== "undefined" && CSS.supports("animation-timeline: scroll()");

      function el(html) {
        fallbackAttached = false;
        document.getElementById("app").innerHTML = html;
      }
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function findFrame(id) {
        return state.frames.find((f) => f.id === id);
      }
      function selectedFrame() {
        return findFrame(state.selectedFrameId);
      }
      function frameIdCounter() {
        return "f" + Date.now().toString(36).slice(-5);
      }

      function buildKeyframesCSS() {
        const sorted = [...state.frames].sort((a, b) => a.pct - b.pct);
        const uses = { ty: false, scale: false, rotate: false, opacity: false, width: false };
        sorted.forEach((f) =>
          Object.keys(f.props).forEach((k) => {
            if (f.props[k] !== undefined) uses[k] = true;
          })
        );

        let body = sorted
          .map((f) => {
            const decls = [];
            if (uses.opacity) decls.push(`opacity: ${(f.props.opacity ?? 100) / 100};`);
            if (uses.ty || uses.scale || uses.rotate) {
              const ty = uses.ty ? (f.props.ty ?? 0) : 0;
              const sc = uses.scale ? (f.props.scale ?? 100) / 100 : 1;
              const rt = uses.rotate ? (f.props.rotate ?? 0) : 0;
              decls.push(`transform: translateY(${ty}px) scale(${sc}) rotate(${rt}deg);`);
            }
            if (uses.width) decls.push(`width: ${f.props.width ?? 100}%;`);
            return `  ${f.pct}% {\n    ${decls.join("\n    ")}\n  }`;
          })
          .join("\n");

        return `@keyframes reel-sequence {\n${body}\n}`;
      }

      function buildAnimationCSS() {
        const timelineName = state.mode === "view" ? "view()" : "scroll(nearest block)";
        const rangeLine = state.mode === "view" ? `  animation-range: ${state.range.start}% ${state.range.end}%;` : `  animation-range: ${state.range.start}% ${state.range.end}%;`;
        return `.reel-subject {\n  animation-name: reel-sequence;\n  animation-duration: auto;\n  animation-timeline: ${timelineName};\n${rangeLine}\n  animation-fill-mode: both;\n}`;
      }

      function buildFullCSS() {
        return buildKeyframesCSS() + "\n\n" + buildAnimationCSS();
      }

      function highlightCSS(css) {
        return esc(css)
          .replace(/(@keyframes[^\{]*)/g, '<span class="at">$1</span>')
          .replace(/^(\.[a-zA-Z0-9_-]+)(?=\s*\{)/gm, '<span class="sel">$1</span>')
          .replace(/(animation-name|animation-timeline|animation-range|animation-fill-mode|opacity|transform|width)(?=:)/g, '<span class="prop">$1</span>')
          .replace(/\{|\}/g, (m) => `<span class="brace">${m}</span>`);
      }

      function render() {
        el(`
  <div class="wrap">
    <div class="title-card">
      <div class="reel-name">Reel</div>
      <div class="reel-sub">The Scroll-Timeline Darkroom</div>
      <p class="reel-tagline">Build real <code>animation-timeline: scroll()</code> and <code>animation-timeline: view()</code> sequences — no JavaScript, no IntersectionObserver. Drag frames onto the filmstrip below and watch native CSS drive the scrollable subject on the right.</p>
      <span class="support-flag ${SUPPORTS_SCROLL_TIMELINE ? "ok" : "no"}">
        ${SUPPORTS_SCROLL_TIMELINE ? I.check : "✕"} ${SUPPORTS_SCROLL_TIMELINE ? "Your browser supports scroll-driven animations" : "Your browser does not yet support scroll-driven animations — the demo pane will show a static preview"}
      </span>
    </div>

    <div class="mode-clapper">
      <button class="mode-tab ${state.mode === "scroll" ? "active" : ""}" onclick="setMode('scroll')">animation-timeline: scroll()</button>
      <button class="mode-tab ${state.mode === "view" ? "active" : ""}" onclick="setMode('view')">animation-timeline: view()</button>
    </div>

    <div class="presets-row">
      ${Object.entries(PRESETS)
        .map(
          ([key, p]) => `
        <button class="preset-can ${state.presetKey === key ? "active" : ""}" onclick="loadPreset('${key}')">
          ${p.icon}<span>${p.label}</span>
        </button>
      `
        )
        .join("")}
    </div>

    <div class="workbench">
      <div class="filmstrip-panel">
        <div class="panel-heading"><h2>The Filmstrip</h2><span class="sub-note">${state.frames.length} frames</span></div>

        <div class="filmstrip">
          <div class="sprocket-row top">${sprocketHoles()}</div>
          <div class="track-area" id="track-area">
            <div class="track-line"></div>
            <div class="range-band" style="left:${state.range.start}%; width:${state.range.end - state.range.start}%;">
              <span class="range-label">active range</span>
            </div>
            ${state.frames
              .map(
                (f) => `
              <div class="frame-marker ${f.id === state.selectedFrameId ? "selected" : ""}" data-id="${f.id}" style="left:${f.pct}%"
                onmousedown="startFrameDrag(event, '${f.id}')">${f.pct}%</div>
            `
              )
              .join("")}
          </div>
          <div class="sprocket-row bottom">${sprocketHoles()}</div>
        </div>

        <p class="filmstrip-hint">Drag a <b>frame</b> left or right to change when it fires. Click a frame to edit its properties below.</p>

        <div class="frame-controls">
          <button class="frame-btn" onclick="addFrame()">${I.plus} Add frame</button>
          <button class="frame-btn danger" onclick="removeFrame()" ${state.frames.length <= 2 ? "disabled" : ""}>${I.trash} Remove selected</button>
        </div>

        <div class="frame-editor">
          <div class="frame-editor-title" id="frame-editor-title">Editing Frame at ${selectedFrame().pct}%</div>
          ${renderPropGrid()}
        </div>

        <div class="range-controls">
          <div class="range-stepper-group">
            <label>Range start</label>
            <div class="stepper">
              <button onclick="changeRange('start', -5)">−</button>
              <span>${state.range.start}%</span>
              <button onclick="changeRange('start', 5)">+</button>
            </div>
          </div>
          <div class="range-stepper-group">
            <label>Range end</label>
            <div class="stepper">
              <button onclick="changeRange('end', -5)">−</button>
              <span>${state.range.end}%</span>
              <button onclick="changeRange('end', 5)">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="viewer-panel">
        <div class="panel-heading"><h2>Live Reel</h2><span class="sub-note">scroll me</span></div>
        <div class="viewer-frame">
          <div class="viewer-scroll" id="viewer-scroll">
            <div class="viewer-track">
              <div class="viewer-progress-track"><div class="viewer-progress-fill" id="viewer-progress-fill"></div></div>
              <div class="viewer-spacer">Scroll down to bring the subject into view</div>
              <div class="viewer-subject-wrap">
                <div class="reel-subject viewer-subject" id="reel-subject">Reel<br>Subject</div>
              </div>
              ${
                state.frames.some((f) => f.props.width !== undefined)
                  ? `
                <div class="viewer-bar-wrap"><div class="viewer-bar-fill reel-subject" id="reel-bar" style="width:0%"></div></div>`
                  : ""
              }
              <div class="viewer-spacer">Keep scrolling — the range band above controls exactly when the effect plays</div>
              <div class="viewer-spacer" style="height:220px">End of reel</div>
            </div>
          </div>
        </div>
        <div class="viewer-actions"><button class="rewind-btn" onclick="rewindViewer()">${I.rotate} Rewind</button></div>
        <p class="viewer-note">Mode: <b>${state.mode === "view" ? "view() — plays as the subject crosses the viewport" : "scroll() — plays across the whole scroll container"}</b></p>
      </div>
    </div>

    <div class="tray-grid">
      <div class="code-tray">
        <div class="tray-head">
          <span>Generated CSS</span>
          <button class="copy-btn ${state.copied ? "copied" : ""}" onclick="copyCSS()">${state.copied ? I.check : I.copy} ${state.copied ? "Copied" : "Copy CSS"}</button>
        </div>
        <pre class="code-out" id="code-out">${highlightCSS(buildFullCSS())}</pre>
      </div>

      <div class="concept-tray">
        <h3>How This Actually Works</h3>
        <div class="concept-row">${I.eye}<div><b>animation-timeline</b><p>Instead of time, the animation's progress is driven by <code>scroll()</code> (the scrollable ancestor's scroll offset) or <code>view()</code> (how far the element itself has crossed the viewport). No JS scroll listener runs at all.</p></div></div>
        <div class="concept-row">${I.progress}<div><b>animation-range</b><p>Narrows exactly which portion of the timeline the keyframes map to — e.g. <code>0% 55%</code> means the whole animation completes in just the first half of the scroll range, then holds.</p></div></div>
        <div class="concept-row">${I.parallax}<div><b>Why this replaces JS</b><p>Historically this required an <code>IntersectionObserver</code> or scroll event listener recalculating styles every frame. This is now pure, GPU-composited CSS, evaluated natively by the browser's own rendering pipeline.</p></div></div>
      </div>
    </div>

    <p class="footer-note">This is a genuinely new browser primitive — <b>Reel</b> is one of the first visual builders for it anywhere.</p>
  </div>
  `);
        applyLiveAnimation();
      }

      function sprocketHoles() {
        let h = "";
        for (let i = 0; i < 22; i++) h += `<div class="sprocket-hole"></div>`;
        return h;
      }

      function renderPropGrid() {
        const f = selectedFrame();
        const fields = [];
        fields.push({ key: "opacity", label: "Opacity", min: 0, max: 100, unit: "%" });
        fields.push({ key: "ty", label: "Translate Y", min: -80, max: 80, unit: "px" });
        fields.push({ key: "scale", label: "Scale", min: 40, max: 130, unit: "%" });
        fields.push({ key: "rotate", label: "Rotate", min: -45, max: 45, unit: "deg" });
        if (state.frames.some((fr) => fr.props.width !== undefined)) {
          fields.push({ key: "width", label: "Bar Width", min: 0, max: 100, unit: "%" });
        }
        return `<div class="prop-grid">${fields
          .map((field) => {
            const val = f.props[field.key] ?? (field.key === "scale" ? 100 : 0);
            return `<div class="prop-field">
      <label>${field.label} <span class="val" id="val-${field.key}">${val}${field.unit}</span></label>
      <input type="range" min="${field.min}" max="${field.max}" value="${val}" oninput="updateProp('${field.key}', this.value)">
    </div>`;
          })
          .join("")}</div>`;
      }

      function setMode(m) {
        state.mode = m;
        render();
      }
      function loadPreset(key) {
        state = freshStateFromPreset(key);
        render();
      }
      function selectFrame(id) {
        state.selectedFrameId = id;
        render();
      }
      function addFrame() {
        const pct = Math.min(95, Math.max(5, (selectedFrame().pct + 25) % 100));
        const newFrame = { id: frameIdCounter(), pct, props: { ...selectedFrame().props } };
        state.frames.push(newFrame);
        state.selectedFrameId = newFrame.id;
        render();
      }
      function removeFrame() {
        if (state.frames.length <= 2) return;
        state.frames = state.frames.filter((f) => f.id !== state.selectedFrameId);
        state.selectedFrameId = state.frames[0].id;
        render();
      }
      function updateProp(key, val) {
        const f = selectedFrame();
        f.props[key] = Number(val);
        refreshLight();
      }
      function changeRange(which, delta) {
        let val = state.range[which] + delta;
        val = Math.max(0, Math.min(100, val));
        if (which === "start" && val >= state.range.end) return;
        if (which === "end" && val <= state.range.start) return;
        state.range[which] = val;
        render();
      }

      function refreshLight() {
        const codeEl = document.getElementById("code-out");
        if (codeEl) codeEl.innerHTML = highlightCSS(buildFullCSS());
        applyLiveAnimation();

        const grid = document.querySelector(".frame-editor");
        if (grid) {
          const title = grid.querySelector(".frame-editor-title");
          if (title) title.textContent = `Editing Frame at ${selectedFrame().pct}%`;

          const f = selectedFrame();
          const units = { opacity: "%", ty: "px", scale: "%", rotate: "deg", width: "%" };

          Object.keys(units).forEach((k) => {
            const el = document.getElementById("val-" + k);
            if (el && f.props[k] !== undefined) {
              el.textContent = f.props[k] + units[k];
            }
          });
        }
      }

      function applyLiveAnimation() {
        let tag = document.getElementById("reel-live-style");
        if (!tag) {
          tag = document.createElement("style");
          tag.id = "reel-live-style";
          document.head.appendChild(tag);
        }
        const css = buildFullCSS();
        if (SUPPORTS_SCROLL_TIMELINE) {
          tag.textContent = css;
        } else {
          tag.textContent = buildKeyframesCSS();
          attachScrollFallback();
        }
      }

      let fallbackAttached = false;
      function attachScrollFallback() {
        const scroller = document.getElementById("viewer-scroll");
        if (!scroller) return;
        if (fallbackAttached) return;
        fallbackAttached = true;
        scroller._fallbackCleanup = () => {
          fallbackAttached = false;
        };
        scroller.addEventListener("scroll", () => {
          const max = scroller.scrollHeight - scroller.clientHeight;
          const pct = max > 0 ? (scroller.scrollTop / max) * 100 : 0;
          const subject = document.getElementById("reel-subject");
          const bar = document.getElementById("reel-bar");
          const sorted = [...state.frames].sort((a, b) => a.pct - b.pct);
          const clamped = Math.max(state.range.start, Math.min(state.range.end, pct));
          const rangePct = ((clamped - state.range.start) / (state.range.end - state.range.start)) * 100;
          const interp = interpolateFrames(sorted, rangePct);
          if (subject) {
            subject.style.opacity = (interp.opacity ?? 100) / 100;
            subject.style.transform = `translateY(${interp.ty ?? 0}px) scale(${(interp.scale ?? 100) / 100}) rotate(${interp.rotate ?? 0}deg)`;
          }
          if (bar) bar.style.width = (interp.width ?? 0) + "%";
        });
      }
      function interpolateFrames(sorted, pct) {
        if (pct <= sorted[0].pct) return sorted[0].props;
        if (pct >= sorted[sorted.length - 1].pct) return sorted[sorted.length - 1].props;
        for (let i = 0; i < sorted.length - 1; i++) {
          const a = sorted[i],
            b = sorted[i + 1];
          if (pct >= a.pct && pct <= b.pct) {
            const denom = b.pct - a.pct;
            const t = denom === 0 ? 0 : (pct - a.pct) / denom;
            const out = {};
            Object.keys(a.props).forEach((k) => {
              out[k] = a.props[k] + (b.props[k] - a.props[k]) * t;
            });
            return out;
          }
        }
        return sorted[0].props;
      }

      let dragState = null;
      function startFrameDrag(e, id) {
        e.preventDefault();
        e.stopPropagation();
        const track = document.getElementById("track-area");
        const rect = track.getBoundingClientRect();
        dragState = { id, rect };
        state.selectedFrameId = id;
        document.querySelectorAll(".frame-marker").forEach((m) => m.classList.toggle("selected", m.dataset.id === id));
        document.addEventListener("mousemove", onFrameDragMove);
        document.addEventListener("mouseup", onFrameDragUp);
      }
      function onFrameDragMove(e) {
        if (!dragState) return;
        let pct = Math.round(((e.clientX - dragState.rect.left) / dragState.rect.width) * 100);
        pct = Math.max(0, Math.min(100, pct));
        const f = findFrame(dragState.id);
        f.pct = pct;
        const marker = document.querySelector(`.frame-marker[data-id="${dragState.id}"]`);
        if (marker) {
          marker.style.left = pct + "%";
          marker.textContent = pct + "%";
        }
        const title = document.getElementById("frame-editor-title");
        if (title && state.selectedFrameId === dragState.id) title.textContent = `Editing Frame at ${pct}%`;
      }
      function onFrameDragUp() {
        document.removeEventListener("mousemove", onFrameDragMove);
        document.removeEventListener("mouseup", onFrameDragUp);
        if (!dragState) return;
        dragState = null;
        render();
      }

      function rewindViewer() {
        const scroller = document.getElementById("viewer-scroll");
        if (scroller) scroller.scrollTo({ top: 0, behavior: "smooth" });
      }

      function copyCSS() {
        const css = buildFullCSS();
        const done = () => {
          state.copied = true;
          render();
          setTimeout(() => {
            state.copied = false;
            render();
          }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(css)
            .then(done)
            .catch(() => fallbackCopy(css, done));
        } else {
          fallbackCopy(css, done);
        }
      }
      function fallbackCopy(text, cb) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        cb();
      }

      render();
    </script>
  </body>
</html>
