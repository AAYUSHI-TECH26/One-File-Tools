<!--
XPath Tester
Single-file client-side XPath playground.
Test XPath expressions against XML documents directly in the browser.
No dependencies.
Built for One File Tools.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPath Tester — One File Tools</title>
    <meta name="description" content="Test XPath expressions against XML documents with live results directly in your browser." />

    <style>
      /* ========================================
         Reset & Base
         ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --font-display: var(--font-sans);
        --radius-sm: 12px;
        --radius-md: 20px;

        --bg: #fafafa;
        --grid-line: #e5e7eb;
        --panel: rgba(255, 255, 255, 0.75);
        --panel-border: #e5e7eb;
        --accent: #16a34a;
        --accent-hover: #15803d;
        --accent-glow: rgba(22, 163, 74, 0.15);
        --danger: #dc2626;
        --text: #1a1a1a;
        --text-muted: #4b5563;
        --text-dim: #9ca3af;
        --input-bg: rgba(255, 255, 255, 0.9);
        --output-bg: rgba(255, 255, 255, 0.8);
        --stat-bg: rgba(255, 255, 255, 0.6);
        --btn-bg: rgba(0, 0, 0, 0.05);
        --btn-bg-hover: rgba(0, 0, 0, 0.1);
        --btn-primary-text: #ffffff;
      }

      /* ========================================
         Dark Mode
         ======================================== */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --grid-line: #111827;
          --panel: rgba(17, 24, 39, 0.7);
          --panel-border: #1f2937;
          --accent: #4ade80;
          --accent-hover: #22c55e;
          --accent-glow: rgba(74, 222, 128, 0.15);
          --danger: #f87171;
          --text: #e5e5e5;
          --text-muted: #9ca3af;
          --text-dim: #4b5563;
          --input-bg: rgba(17, 24, 39, 0.8);
          --output-bg: rgba(3, 7, 18, 0.7);
          --stat-bg: rgba(3, 7, 18, 0.5);
          --btn-bg: rgba(31, 41, 55, 0.6);
          --btn-bg-hover: rgba(55, 65, 81, 0.8);
          --btn-primary-text: #052e16;
        }
      }

      /* ========================================
         Your styles here
         ======================================== */

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .app {
        width: 100%;
        max-width: 850px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
        position: relative;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .wordmark {
        font-family: var(--font-display);
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 600px;
        margin: auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md, 20px);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      textarea,
      input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 14px;
        line-height: 1.6;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      textarea:focus,
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .group {
        margin-bottom: 22px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .btn {
        background: var(--btn-bg);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn:hover {
        background: var(--btn-bg-hover);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--btn-primary-text);
        border: none;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 18px;
      }

      .stat-card {
        background: var(--stat-bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm, 12px);
        padding: 16px;
        text-align: center;
      }

      .stat-value {
        font-family: var(--font-display);
        font-size: 30px;
        color: var(--accent);
      }

      .stat-label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .output {
        margin-top: 18px;
        background: var(--output-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        white-space: pre-wrap;
        overflow: auto;
        min-height: 80px;
      }

      .error {
        color: var(--danger);
      }

      .examples {
        margin-top: 20px;
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.8;
      }

      .example-btn {
        background: none;
        border: none;
        color: var(--accent);
        font-family: var(--font-mono);
        font-size: 13px;
        cursor: pointer;
        padding: 0;
      }

      .example-btn:hover {
        text-decoration: underline;
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
      }

      .footer-note a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer-note a:hover {
        text-decoration: underline;
      }

      @media (max-width: 640px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }
      }

      :root {
        --scroll-thumb: rgba(22, 163, 74, 0.4);
        --scroll-thumb-hover: rgba(22, 163, 74, 0.7);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --scroll-thumb: rgba(74, 222, 128, 0.35);
          --scroll-thumb-hover: rgba(74, 222, 128, 0.7);
        }
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) transparent;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utilities</div>
        <h1 class="wordmark">XPath Tester</h1>
        <p class="tagline">Test XPath expressions against XML documents instantly in your browser. No server, no setup, completely client-side.</p>
      </header>

      <main class="studio">
        <div class="group">
          <label class="section-label">XML Document</label>
          <textarea id="xmlInput">
            <library>
            <book id="1">
                <title>Clean Code</title>
                <author>Robert Martin</author>
            </book>

            <book id="2">
                <title>Refactoring</title>
                <author>Martin Fowler</author>
            </book>
            </library>
            </textarea>
        </div>

        <div class="group">
          <label class="section-label">XPath Expression</label>
          <input id="xpathInput" value="//book/title" />
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="evaluateBtn">Evaluate</button>
          <button class="btn" id="copyBtn">Copy Result</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="matchCount">0</div>
            <div class="stat-label">Matches</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="resultType">-</div>
            <div class="stat-label">Type</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="status">Ready</div>
            <div class="stat-label">Status</div>
          </div>
        </div>

        <div class="output" id="resultOutput">Run an XPath expression to see results.</div>

        <div class="examples">
          Examples:
          <br />
          <button class="example-btn" data-xpath="//book">//book → Select all books</button>
          <br />
          <button class="example-btn" data-xpath="//book/title">//book/title → Select titles</button>
          <br />
          <button class="example-btn" data-xpath="//book[@id='1']">//book[@id='1'] → Find by attribute</button>
          <br />
          <button class="example-btn" data-xpath="count(//book)">count(//book) → Count nodes</button>
        </div>
      </main>

      <footer class="footer-note">
        <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
      </footer>
    </div>

    <script>
      /*
          XPath Tester
          Vanilla JavaScript, no dependencies.
        */

      const xmlInput = document.getElementById("xmlInput");
      const xpathInput = document.getElementById("xpathInput");
      const evaluateBtn = document.getElementById("evaluateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const resultOutput = document.getElementById("resultOutput");
      const matchCount = document.getElementById("matchCount");
      const resultType = document.getElementById("resultType");
      const status = document.getElementById("status");

      let latestResult = "";

      /**
       * Parse XML string into XML document.
       */
      function parseXML(xmlText) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const parserError = xmlDoc.querySelector("parsererror");
        if (parserError) {
          const errorMessage = parserError.textContent.replace(/\s+/g, " ").trim();
          throw new Error("XML Error:\n" + errorMessage);
        }
        return xmlDoc;
      }
      /**
       *  XPath namespace resolver from XML document.
       */
      function createNamespaceResolver(xmlDoc) {
        const namespaces = {};

        const root = xmlDoc.documentElement;

        for (const attribute of root.attributes) {
          if (attribute.name.startsWith("xmlns:")) {
            const prefix = attribute.name.split(":")[1];
            namespaces[prefix] = attribute.value;
          }
        }

        return function (prefix) {
          return namespaces[prefix] || null;
        };
      }

      /**
       * Convert XPath result into readable output.
       */
      function evaluateXPath(xmlDoc, expression) {
        const resolver = createNamespaceResolver(xmlDoc);

        const result = xmlDoc.evaluate(expression, xmlDoc, resolver, XPathResult.ANY_TYPE, null);

        const output = [];

        switch (result.resultType) {
          case XPathResult.STRING_TYPE:
            output.push(result.stringValue);
            return { type: "String", values: output };

          case XPathResult.NUMBER_TYPE:
            output.push(String(result.numberValue));
            return { type: "Number", values: output };

          case XPathResult.BOOLEAN_TYPE:
            output.push(String(result.booleanValue));
            return { type: "Boolean", values: output };

          default:
            let node;
            while ((node = result.iterateNext())) {
              output.push(new XMLSerializer().serializeToString(node));
            }
            return { type: "Nodes", values: output };
        }
      }

      /**
       * Run XPath evaluation.
       */
      function runXPath() {
        try {
          const xmlDoc = parseXML(xmlInput.value);
          const expression = xpathInput.value.trim();

          if (!expression) {
            throw new Error("XPath expression is empty");
          }

          const result = evaluateXPath(xmlDoc, expression);
          latestResult = result.values.join("\n\n");

          resultOutput.textContent = latestResult || "No matching results found.";
          matchCount.textContent = result.values.length;
          resultType.textContent = result.type;
          status.textContent = "OK";
          resultOutput.classList.remove("error");
        } catch (error) {
          latestResult = error.message;
          resultOutput.textContent = error.message;
          resultOutput.classList.add("error");
          matchCount.textContent = "0";
          resultType.textContent = "-";
          status.textContent = "Error";
        }
      }

      document.querySelectorAll(".example-btn").forEach((button) => {
        button.addEventListener("click", () => {
          xpathInput.value = button.dataset.xpath;
          runXPath();
        });
      });

      /**
       * Copy output.
       */
      copyBtn.addEventListener("click", async () => {
        if (!latestResult) {
          return;
        }
        try {
          await navigator.clipboard.writeText(latestResult);
          copyBtn.textContent = "Copied!";
          setTimeout(() => {
            copyBtn.textContent = "Copy Result";
          }, 1500);
        } catch {
          copyBtn.textContent = "Copy failed";
        }
      });

      evaluateBtn.addEventListener("click", runXPath);
      xmlInput.addEventListener("input", runXPath);
      xpathInput.addEventListener("input", runXPath);

      // Initial evaluation
      runXPath();
    </script>
  </body>
</html>
