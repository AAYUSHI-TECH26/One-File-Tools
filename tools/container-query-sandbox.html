<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Container Query Sandbox — Build &amp; Test @container Rules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,500&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b1320;
        --panel: #101d30;
        --panel2: #16283f;
        --panel3: #1c3350;
        --line: #25405e;
        --line-soft: #1c2f47;
        --ink: #eaf1fb;
        --ink-dim: #8199b3;
        --amber: #e2984e;
        --amber-bright: #f4b56c;
        --amber-glow: rgba(226, 152, 78, 0.22);
        --cyan: #5ec6ff;
        --cyan-dim: #2f6f96;
        --cyan-glow: rgba(94, 198, 255, 0.16);
        --good: #6fbf8b;
        --good-glow: rgba(111, 191, 139, 0.18);
        --danger: #e2665a;
        --danger-glow: rgba(226, 102, 90, 0.2);
        --font-display: "Newsreader", serif;
        --font-ui: "Work Sans", sans-serif;
        --font-code: "IBM Plex Mono", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--bg);
      }
      body {
        background: linear-gradient(rgba(94, 198, 255, 0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(94, 198, 255, 0.045) 1px, transparent 1px), radial-gradient(ellipse at 20% -10%, #16273e 0%, transparent 55%), var(--bg);
        background-size:
          34px 34px,
          34px 34px,
          100% 100%,
          100% 100%;
        color: var(--ink);
        font-family: var(--font-ui);
        min-height: 100vh;
        line-height: 1.6;
      }
      button,
      input,
      textarea,
      select {
        font-family: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        background: none;
        border: none;
      }
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--amber-bright);
        outline-offset: 2px;
      }
      ::selection {
        background: var(--amber-glow);
      }

      .wrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 38px 24px 80px;
      }

      /* ---- masthead ---- */
      .masthead {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        flex-wrap: wrap;
        margin-bottom: 32px;
        padding-bottom: 26px;
        border-bottom: 1px solid var(--line);
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .brand-icon {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
      }
      .brand-text h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 30px;
        color: var(--ink);
        letter-spacing: 0.005em;
      }
      .brand-text p {
        font-size: 12.5px;
        color: var(--ink-dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 5px;
      }
      .masthead-note {
        max-width: 380px;
        font-size: 13px;
        color: var(--ink-dim);
        line-height: 1.75;
        text-align: right;
      }
      .masthead-note b {
        color: var(--amber-bright);
        font-weight: 600;
      }

      /* ---- concept banner ---- */
      .concept-banner {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        background: linear-gradient(150deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-left: 3px solid var(--cyan);
        border-radius: 12px;
        padding: 18px 22px;
        margin-bottom: 28px;
      }
      .concept-banner svg {
        width: 22px;
        height: 22px;
        color: var(--cyan);
        flex-shrink: 0;
        margin-top: 2px;
      }
      .concept-banner p {
        font-size: 13.5px;
        color: var(--ink-dim);
        line-height: 1.75;
      }
      .concept-banner b {
        color: var(--ink);
        font-weight: 600;
      }
      .concept-banner code {
        font-family: var(--font-code);
        background: rgba(94, 198, 255, 0.1);
        color: var(--cyan);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 12.5px;
      }

      /* ---- layout ---- */
      .studio {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 26px;
        align-items: start;
      }
      @media (max-width: 960px) {
        .studio {
          grid-template-columns: 1fr;
        }
      }

      /* ---- panels ---- */
      .panel {
        background: linear-gradient(165deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }
      .panel + .panel {
        margin-top: 20px;
      }
      .panel-title {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--amber-bright);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title svg {
        width: 14px;
        height: 14px;
      }

      /* ---- container setup controls ---- */
      .field-row {
        margin-bottom: 16px;
      }
      .field-row:last-child {
        margin-bottom: 0;
      }
      .field-label {
        display: block;
        font-size: 12.5px;
        color: var(--ink-dim);
        font-weight: 500;
        margin-bottom: 8px;
      }
      .field-label b {
        color: var(--ink);
        font-weight: 600;
      }
      .seg-control {
        display: flex;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--line);
        border-radius: 9px;
        overflow: hidden;
      }
      .seg-btn {
        flex: 1;
        padding: 9px 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-dim);
        text-align: center;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .seg-btn.active {
        background: var(--amber-glow);
        color: var(--amber-bright);
      }
      .text-input {
        width: 100%;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 12px;
        font-family: var(--font-code);
        font-size: 13px;
        color: var(--cyan);
      }

      /* ---- unit demo toggle ---- */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .toggle-switch {
        width: 44px;
        height: 24px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.3);
        border: 1.5px solid var(--line);
        position: relative;
        flex-shrink: 0;
        transition: border-color 0.2s;
      }
      .toggle-knob {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: var(--ink-dim);
        transition:
          transform 0.22s cubic-bezier(0.3, 1.3, 0.4, 1),
          background 0.2s;
      }
      .toggle-switch.on {
        border-color: var(--cyan);
      }
      .toggle-switch.on .toggle-knob {
        transform: translateX(20px);
        background: var(--cyan);
      }

      /* ---- rule cards ---- */
      .rule-card {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 14px 15px;
        margin-bottom: 12px;
      }
      .rule-card:last-child {
        margin-bottom: 0;
      }
      .rule-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .rule-cond-select {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        font-family: var(--font-code);
        font-size: 12px;
        color: var(--amber-bright);
      }
      .rule-value-input {
        width: 72px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        font-family: var(--font-code);
        font-size: 12px;
        color: var(--ink);
        text-align: center;
      }
      .rule-unit {
        font-family: var(--font-code);
        font-size: 12px;
        color: var(--ink-dim);
      }
      .rule-del {
        margin-left: auto;
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: var(--ink-dim);
        border-radius: 6px;
        flex-shrink: 0;
      }
      .rule-del:hover {
        color: var(--danger);
        background: var(--danger-glow);
      }
      .rule-del svg {
        width: 13px;
        height: 13px;
      }
      .rule-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1px solid var(--line);
        color: var(--ink-dim);
        margin-bottom: 9px;
      }
      .rule-badge.active {
        border-color: var(--good);
        color: var(--good);
        background: var(--good-glow);
      }
      .rule-badge svg {
        width: 9px;
        height: 9px;
      }
      .rule-textarea {
        width: 100%;
        min-height: 64px;
        background: rgba(0, 0, 0, 0.28);
        border: 1px dashed var(--line);
        border-radius: 7px;
        padding: 9px 11px;
        font-family: var(--font-code);
        font-size: 12px;
        color: var(--cyan);
        resize: vertical;
        line-height: 1.6;
      }

      .add-rule-btn {
        width: 100%;
        margin-top: 6px;
        padding: 11px;
        border: 1px dashed var(--cyan-dim);
        border-radius: 10px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--cyan);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s;
      }
      .add-rule-btn:hover {
        background: var(--cyan-glow);
      }
      .add-rule-btn svg {
        width: 15px;
        height: 15px;
      }

      .reset-btn {
        width: 100%;
        margin-top: 16px;
        padding: 10px;
        border: 1px dashed var(--line);
        border-radius: 9px;
        font-size: 12px;
        color: var(--ink-dim);
        text-align: center;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .reset-btn:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ---- stage / demo area ---- */
      .stage-card {
        background: linear-gradient(165deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px;
        margin-bottom: 24px;
      }
      .stage-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .stage-toolbar-title {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }
      .dim-readout {
        font-family: var(--font-code);
        font-size: 13px;
        color: var(--amber-bright);
        background: rgba(226, 152, 78, 0.1);
        border: 1px solid var(--amber);
        padding: 5px 13px;
        border-radius: 20px;
      }

      .stage-outer {
        display: flex;
        justify-content: center;
        padding: 20px 10px 6px;
        overflow-x: auto;
      }
      .stage-resizer {
        position: relative;
        background: rgba(0, 0, 0, 0.22);
        border: 1.5px solid var(--cyan-dim);
        border-radius: 12px;
        min-width: 180px;
        max-width: 100%;
        transition: none;
      }
      .resize-handle-r {
        position: absolute;
        top: 0;
        right: -11px;
        width: 22px;
        height: 100%;
        cursor: ew-resize;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      .resize-handle-r::before {
        content: "";
        width: 6px;
        height: 52px;
        border-radius: 4px;
        background: var(--cyan);
        box-shadow: 0 0 10px var(--cyan-glow);
      }
      .resize-handle-b {
        position: absolute;
        left: 0;
        bottom: -11px;
        width: 100%;
        height: 22px;
        cursor: ns-resize;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      .resize-handle-b::before {
        content: "";
        height: 6px;
        width: 52px;
        border-radius: 4px;
        background: var(--cyan);
        box-shadow: 0 0 10px var(--cyan-glow);
      }

      /* ---- demo component (what the container queries actually style) ---- */
      .cq-demo-target {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
        font-family: var(--font-ui);
      }
      .demo-avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        flex-shrink: 0;
        background: conic-gradient(from 210deg, var(--amber), var(--cyan), var(--amber));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-weight: 600;
        color: #0b1320;
        font-size: 19px;
      }
      .demo-body {
        flex: 1;
        min-width: 0;
      }
      .demo-name {
        font-weight: 700;
        font-size: 15px;
        color: var(--ink);
        margin-bottom: 3px;
      }
      .demo-role {
        font-size: 12.5px;
        color: var(--ink-dim);
      }
      .demo-meta {
        display: none;
        font-family: var(--font-code);
        font-size: 11.5px;
        color: var(--cyan);
        background: rgba(94, 198, 255, 0.08);
        padding: 6px 12px;
        border-radius: 8px;
        white-space: nowrap;
      }
      .demo-cqi-sample {
        margin-top: 4px;
        font-weight: 600;
        color: var(--amber-bright);
        font-size: 6cqi;
        line-height: 1.2;
      }
      .demo-cqi-label {
        font-family: var(--font-code);
        font-size: 10px;
        color: var(--ink-dim);
        margin-top: 8px;
        letter-spacing: 0.04em;
      }

      .stage-hint {
        text-align: center;
        font-size: 12.5px;
        color: var(--ink-dim);
        margin-top: 16px;
        font-style: italic;
      }
      .stage-hint b {
        color: var(--amber-bright);
        font-style: normal;
      }

      /* ---- output section ---- */
      .output-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 22px;
      }
      @media (max-width: 960px) {
        .output-grid {
          grid-template-columns: 1fr;
        }
      }

      .code-card {
        background: #0a0f18;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .code-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      .code-card-head span {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 600;
        color: var(--cyan);
        border: 1px solid var(--cyan-dim);
        padding: 7px 14px;
        border-radius: 20px;
        transition: background 0.15s;
      }
      .copy-btn:hover {
        background: var(--cyan-glow);
      }
      .copy-btn svg {
        width: 13px;
        height: 13px;
      }
      .copy-btn.copied {
        border-color: var(--good);
        color: var(--good);
      }
      pre.code-block {
        padding: 18px 20px;
        font-family: var(--font-code);
        font-size: 12.5px;
        line-height: 1.8;
        color: #cfe0ee;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        max-height: 420px;
        overflow-y: auto;
      }
      .code-block .at {
        color: var(--amber-bright);
      }
      .code-block .sel {
        color: var(--cyan);
      }
      .code-block .prop {
        color: var(--amber-bright);
      }
      .code-block .val {
        color: #dbe7f2;
      }
      .code-block .brace {
        color: var(--ink-dim);
      }
      .code-block .cmt {
        color: #57708c;
        font-style: italic;
      }

      .compare-card {
        background: linear-gradient(165deg, var(--panel2), var(--panel));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }
      .compare-card-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 16px;
      }
      .compare-row {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }
      .compare-row:last-child {
        margin-bottom: 0;
      }
      .compare-row svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .compare-row.mq svg {
        color: var(--ink-dim);
      }
      .compare-row.cq svg {
        color: var(--cyan);
      }
      .compare-row b {
        display: block;
        font-size: 13px;
        color: var(--ink);
        margin-bottom: 3px;
        font-weight: 600;
      }
      .compare-row p {
        font-size: 12.5px;
        color: var(--ink-dim);
        line-height: 1.6;
      }

      .legend-note {
        margin-top: 24px;
        font-size: 12.5px;
        color: var(--ink-dim);
        text-align: center;
        line-height: 1.75;
      }
      .legend-note b {
        color: var(--amber-bright);
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      /* ============================================================
   CONTAINER QUERY SANDBOX
   Visual builder + live tester for CSS @container rules
   ============================================================ */

      /* ---------- ICONS ---------- */
      const ICON = {
        brand: `<svg viewBox="0 0 48 48" fill="none"><rect x="4" y="4" width="40" height="40" rx="9" fill="#16283f" stroke="#25405e" stroke-width="1.5"/><rect x="11" y="11" width="17" height="12" rx="3" fill="#5ec6ff"/><rect x="30" y="11" width="7" height="26" rx="3" fill="#e2984e"/><rect x="11" y="26" width="17" height="11" rx="3" fill="#e2984e" opacity="0.55"/></svg>`,
        info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01" stroke-linecap="round"/></svg>`,
        ruler: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v3M15 8v3M19 8v3"/></svg>`,
        layers: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M2 13l10 5 10-5"/></svg>`,
        plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
        trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>`,
        dot: `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>`,
        copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>`,
        check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l6 6L20 6"/></svg>`,
        box: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>`,
        monitor: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`
      };

      /* ---------- STATE ---------- */
      const STORAGE_KEY_DEFAULT_RULES = () => [
        {
          id: cryptoId(),
          cond: "min-width",
          value: 280,
          css: "flex-direction: row;\nalign-items: center;\ngap: 16px;"
        },
        {
          id: cryptoId(),
          cond: "min-width",
          value: 460,
          css: ".demo-meta { display: block; }"
        }
      ];
      function cryptoId() {
        return "r" + Math.random().toString(36).slice(2, 9);
      }

      let state = {
        containerName: "cq-sandbox",
        containerType: "inline-size",
        stageWidth: 320,
        stageHeight: 220,
        rules: STORAGE_KEY_DEFAULT_RULES(),
        showUnitDemo: true,
        copied: false
      };

      /* ---------- HELPERS ---------- */
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function el(html) {
        document.getElementById("app").innerHTML = html;
      }

      /* ---------- CSS GENERATION ---------- */
      function buildRulesCSS() {
        const blocks = [];
        blocks.push(`.cq-scope {\n  container-type: ${state.containerType};\n  container-name: ${state.containerName};\n}`);
        state.rules.forEach((r) => {
          const declLines = r.css
            .split("\n")
            .map((l) => l.trim())
            .filter(Boolean);
          // Support either bare declarations (applied to .demo-body/.cq-demo-target) or full selector blocks
          const hasSelector = declLines.some((l) => l.includes("{"));
          let body;
          if (hasSelector) {
            body = r.css;
          } else {
            body = `.cq-demo-target {\n    ${declLines.join("\n    ")}\n  }`;
          }
          blocks.push(`@container ${state.containerName} (${r.cond}: ${r.value}px) {\n  ${body}\n}`);
        });
        return blocks.join("\n\n");
      }

      function formatCSSHTML(css) {
        return esc(css)
          .replace(/(@container[^\{]*)/g, '<span class="at">$1</span>')
          .replace(/(container-type|container-name)(?=:)/g, '<span class="prop">$1</span>')
          .replace(/^(\.[a-zA-Z0-9_-]+)(?=\s*\{)/gm, '<span class="sel">$1</span>')
          .replace(/\{|\}/g, (m) => `<span class="brace">${m}</span>`);
      }

      /* ---------- MAIN RENDER ---------- */
      function render() {
        const css = buildRulesCSS();
        el(`
  <div class="wrap">
    <div class="masthead">
      <div class="brand-row">
        <div class="brand-icon">${ICON.brand}</div>
        <div class="brand-text">
          <h1>Container Query Sandbox</h1>
          <p>Build &amp; test @container rules live</p>
        </div>
      </div>
      <p class="masthead-note">Resize the <b>component</b>, not the browser window. Container queries respond to their parent's size — the rules below are <b>real, active CSS</b>.</p>
    </div>

    <div class="concept-banner">
      ${ICON.info}
      <p>A <code>@container</code> query only works on an element whose ancestor has been declared a container via <b>container-type</b> (and optionally named via <b>container-name</b>). Everything on this page is genuinely rendered by the browser's native container query engine — nothing here is simulated.</p>
    </div>

    <div class="studio">
      <!-- ============ SIDE PANEL ============ -->
      <div>
        <div class="panel">
          <div class="panel-title">${ICON.box} Container Setup</div>
          <div class="field-row">
            <label class="field-label">container-name</label>
            <input class="text-input" id="container-name-input" type="text" value="${esc(state.containerName)}" oninput="setContainerName(this.value)">
          </div>
          <div class="field-row">
            <label class="field-label">container-type</label>
            <div class="seg-control">
              <button class="seg-btn ${state.containerType === "inline-size" ? "active" : ""}" onclick="setContainerType('inline-size')">inline-size</button>
              <button class="seg-btn ${state.containerType === "size" ? "active" : ""}" onclick="setContainerType('size')">size</button>
              <button class="seg-btn ${state.containerType === "normal" ? "active" : ""}" onclick="setContainerType('normal')">normal</button>
            </div>
          </div>
          <div class="field-row" style="margin-bottom:0">
            <div class="toggle-row">
              <label class="field-label" style="margin-bottom:0">Show cqi unit demo</label>
              <button class="toggle-switch ${state.showUnitDemo ? "on" : ""}" onclick="toggleUnitDemo()"><div class="toggle-knob"></div></button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">${ICON.layers} Breakpoint Rules</div>
          <div id="rules-list">${renderRulesList()}</div>
          <button class="add-rule-btn" onclick="addRule()">${ICON.plus} Add breakpoint rule</button>
          <button class="reset-btn" onclick="resetAll()">Reset to defaults</button>
        </div>
      </div>

      <!-- ============ MAIN STAGE ============ -->
      <div>
        <div class="stage-card">
          <div class="stage-toolbar">
            <span class="stage-toolbar-title">Live Demo Stage</span>
            <span class="dim-readout" id="dim-readout">${state.stageWidth}px${state.containerType === "size" ? " × " + state.stageHeight + "px" : ""}</span>
          </div>

          <div class="stage-outer">
            <div class="stage-resizer cq-scope" id="stage-resizer" style="width:${state.stageWidth}px; height:${state.containerType === "size" ? state.stageHeight + "px" : "auto"};">
              <div class="cq-demo-target" id="demo-target">
                <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
                  <div class="demo-avatar">CQ</div>
                  <div class="demo-body">
                    <div class="demo-name">Container Query Card</div>
                    <div class="demo-role">Resizes independent of the viewport</div>
                  </div>
                  <div class="demo-meta">Joined 2024 · Verified</div>
                </div>
                ${
                  state.showUnitDemo
                    ? `
                <div>
                  <div class="demo-cqi-sample">Scales with container</div>
                  <div class="demo-cqi-label">font-size: 6cqi — try resizing the stage</div>
                </div>`
                    : ""
                }
              </div>
              <div class="resize-handle-r" id="handle-r" onpointerdown="startResize(event, 'w')"></div>
              ${state.containerType === "size" ? `<div class="resize-handle-b" id="handle-b" onpointerdown="startResize(event, 'h')"></div>` : ""}
            </div>
          </div>
          <p class="stage-hint">Drag the <b>cyan handle</b> on the right edge${state.containerType === "size" ? " (or bottom edge)" : ""} to resize the container and watch the rules below activate.</p>
        </div>

        <div class="output-grid">
          <div class="code-card">
            <div class="code-card-head">
              <span>Generated CSS</span>
              <button class="copy-btn ${state.copied ? "copied" : ""}" onclick="copyCSS()">
                ${state.copied ? ICON.check : ICON.copy}
                ${state.copied ? "Copied" : "Copy CSS"}
              </button>
            </div>
            <pre class="code-block" id="code-output">${formatCSSHTML(css)}</pre>
          </div>

          <div class="compare-card">
            <div class="compare-card-title">Container Queries vs. Media Queries</div>
            <div class="compare-row mq">
              ${ICON.monitor}
              <div><b>Media Query</b><p>Reads the <i>browser viewport</i>. A component always looks the same regardless of where it's placed — a sidebar widget and a full-width hero both get the same breakpoint.</p></div>
            </div>
            <div class="compare-row cq">
              ${ICON.ruler}
              <div><b>Container Query</b><p>Reads the <i>nearest ancestor</i> marked as a container. The exact same component adapts differently in a narrow sidebar vs. a wide main column — true component-level responsiveness.</p></div>
            </div>
          </div>
        </div>

        <p class="legend-note">Rules apply top-to-bottom like real cascading CSS — a later rule's declarations win if its condition is also true. Empty selectors default to targeting <b>.demo-target</b>; write a full selector block (with <b>{ }</b>) to target something else, like <b>.demo-meta</b>.</p>
      </div>
    </div>
  </div>
  `);
        updateActiveBadges();
        injectStyle(css);
      }

      function renderRulesList() {
        if (state.rules.length === 0) {
          return `<p style="font-size:12.5px; color:var(--ink-dim); font-style:italic; margin-bottom:14px;">No rules yet — add one below.</p>`;
        }
        return state.rules
          .map(
            (r, idx) => `
    <div class="rule-card">
      <span class="rule-badge" id="badge-${r.id}">${ICON.dot} inactive</span>
      <div class="rule-head">
        <select class="rule-cond-select" onchange="updateRuleField('${r.id}', 'cond', this.value)">
          <option value="min-width" ${r.cond === "min-width" ? "selected" : ""}>min-width</option>
          <option value="max-width" ${r.cond === "max-width" ? "selected" : ""}>max-width</option>
          ${
            state.containerType === "size"
              ? `
          <option value="min-height" ${r.cond === "min-height" ? "selected" : ""}>min-height</option>
          <option value="max-height" ${r.cond === "max-height" ? "selected" : ""}>max-height</option>`
              : ""
          }
        </select>
        <input class="rule-value-input" type="number" value="${r.value}" oninput="updateRuleField('${r.id}', 'value', this.value, true)">
        <span class="rule-unit">px</span>
        <button class="rule-del" onclick="removeRule('${r.id}')">${ICON.trash}</button>
      </div>
      <textarea class="rule-textarea" placeholder="flex-direction: row;" oninput="updateRuleField('${r.id}', 'css', this.value)">${esc(r.css)}</textarea>
    </div>
  `
          )
          .join("");
      }

      /* ---------- LIGHTWEIGHT DOM PATCHES (no full re-render mid-interaction) ---------- */
      function injectStyle(css) {
        let tag = document.getElementById("cq-live-style");
        if (!tag) {
          tag = document.createElement("style");
          tag.id = "cq-live-style";
          document.head.appendChild(tag);
        }
        tag.textContent = css;
      }
      function refreshCodeAndBadges() {
        const css = buildRulesCSS();
        injectStyle(css);
        const out = document.getElementById("code-output");
        if (out) out.innerHTML = formatCSSHTML(css);
        updateActiveBadges();
      }
      function updateActiveBadges() {
        state.rules.forEach((r) => {
          const badge = document.getElementById("badge-" + r.id);
          if (!badge) return;
          let active = false;
          if (r.cond === "min-width") active = state.stageWidth >= r.value;
          if (r.cond === "max-width") active = state.stageWidth <= r.value;
          if (r.cond === "min-height") active = state.stageHeight >= r.value;
          if (r.cond === "max-height") active = state.stageHeight <= r.value;
          badge.className = "rule-badge" + (active ? " active" : "");
          badge.innerHTML = ICON.dot + (active ? " active" : " inactive");
        });
        const readout = document.getElementById("dim-readout");
        if (readout) readout.textContent = `${state.stageWidth}px${state.containerType === "size" ? " × " + state.stageHeight + "px" : ""}`;
      }

      /* ---------- RESIZE HANDLE (pointer drag, no re-render mid-drag) ---------- */
      let resizing = null;
      function startResize(e, axis) {
        e.preventDefault();
        resizing = {
          axis,
          startX: e.clientX,
          startY: e.clientY,
          startW: state.stageWidth,
          startH: state.stageHeight
        };
        document.addEventListener("pointermove", onResizeMove);
        document.addEventListener("pointerup", onResizeUp);
      }
      function onResizeMove(e) {
        if (!resizing) return;
        const stage = document.getElementById("stage-resizer");
        if (resizing.axis === "w") {
          let w = resizing.startW + (e.clientX - resizing.startX);
          w = Math.max(160, Math.min(900, w));
          state.stageWidth = Math.round(w);
          if (stage) stage.style.width = state.stageWidth + "px";
        } else {
          let h = resizing.startH + (e.clientY - resizing.startY);
          h = Math.max(90, Math.min(560, h));
          state.stageHeight = Math.round(h);
          if (stage) stage.style.height = state.stageHeight + "px";
        }
        updateActiveBadges();
      }
      function onResizeUp() {
        resizing = null;
        document.removeEventListener("pointermove", onResizeMove);
        document.removeEventListener("pointerup", onResizeUp);
      }

      /* ---------- ACTIONS ---------- */
      function setContainerName(v) {
        const clean = v.trim().replace(/[^a-zA-Z0-9-_]/g, "-") || "cq-sandbox";
        state.containerName = clean;
        refreshCodeAndBadges();
      }
      function setContainerType(t) {
        state.containerType = t;
        render();
      }
      function toggleUnitDemo() {
        state.showUnitDemo = !state.showUnitDemo;
        render();
      }
      function addRule() {
        state.rules.push({
          id: cryptoId(),
          cond: "min-width",
          value: 360,
          css: ""
        });
        render();
      }
      function removeRule(id) {
        state.rules = state.rules.filter((r) => r.id !== id);
        render();
      }
      function updateRuleField(id, field, value, isNumber) {
        const rule = state.rules.find((r) => r.id === id);
        if (!rule) return;
        rule[field] = isNumber ? Number(value) || 0 : value;
        refreshCodeAndBadges();
      }
      function resetAll() {
        state = {
          containerName: "cq-sandbox",
          containerType: "inline-size",
          stageWidth: 320,
          stageHeight: 220,
          rules: STORAGE_KEY_DEFAULT_RULES(),
          showUnitDemo: true,
          copied: false
        };
        render();
      }
      function copyCSS() {
        const css = buildRulesCSS();
        const done = () => {
          state.copied = true;
          refreshCodeAndBadges();
          const btn = document.querySelector(".copy-btn");
          if (btn) {
            btn.classList.add("copied");
            btn.innerHTML = ICON.check + " Copied";
          }
          setTimeout(() => {
            state.copied = false;
            render();
          }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(css)
            .then(done)
            .catch(() => fallbackCopy(css, done));
        } else {
          fallbackCopy(css, done);
        }
      }
      function fallbackCopy(text, cb) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        cb();
      }

      /* ---------- INIT ---------- */
      render();
    </script>
  </body>
</html>
