name: New Instrument Idea
description: Propose a new single-file HTML musical/audio tool.
title: "Idea: "
labels: ["idea", "instruments"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new instrument! Please fill in the details below.
        Make sure your idea isn't already on the Ideas Board or in existing issues.

  - type: input
    id: instrument-name
    attributes:
      label: Instrument Name
      description: A short, descriptive name for the instrument or audio tool.
      placeholder: e.g. Step Sequencer, Guitar Chord Library, Instrument Tuner
    validations:
      required: true

  - type: input
    id: filename
    attributes:
      label: Proposed Filename
      description: Kebab-case .html filename.
      placeholder: e.g. step-sequencer.html
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this instrument belong to?
      options:
        - Rhythm & Percussion
        - Melody & Synthesis
        - Chords & Harmony
        - Notation & Theory
        - Effects & Processing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this instrument do? Who is it for?
      placeholder: Describe the instrument's purpose and what problem or need it addresses.
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Key Features
      description: List the main features (use bullet points).
      placeholder: |
        - Feature 1
        - Feature 2
        - Feature 3
    validations:
      required: true

  - type: textarea
    id: audio-approach
    attributes:
      label: Audio Approach
      description: How will real sound actually be produced? (e.g. Web Audio API oscillators, Tone.js via CDN, sample playback)
      placeholder: e.g. Web Audio API OscillatorNode for synthesis, no audio samples needed.
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested Difficulty
      description: How complex do you think this instrument is? (Final label assigned by maintainer, slightly negotiable.)
      options:
        - Easy
        - Medium
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags for filtering on the landing page.
      placeholder: e.g. synth, sequencer, drum-machine, audio

  - type: textarea
    id: references
    attributes:
      label: References / Inspiration
      description: Any existing tools, hardware instruments, or links for reference? (optional)
      placeholder: Links to similar tools or screenshots for inspiration.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked the Ideas Board and existing issues for duplicates.
          required: true
        - label: This instrument can be built as a single self-contained HTML file.
          required: true
        - label: This instrument does not require a backend server to function.
          required: true
        - label: This instrument produces real, audible sound — not just a visual mockup.
          required: true