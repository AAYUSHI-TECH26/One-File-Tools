<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Interface — One File Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class", theme: { extend: { colors: { brand: { 500: "#6366f1", 600: "#4f46e5" } } } } };
    </script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .bubble-in { animation: pop 0.25s ease; }
      @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .typing-dot { animation: bounce 1.2s infinite; }
      .typing-dot:nth-child(2) { animation-delay: 0.15s; }
      .typing-dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
      .dark ::-webkit-scrollbar-thumb { background: #3f3f52; }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-950 h-screen overflow-hidden">
    <div class="flex h-screen max-w-6xl mx-auto shadow-2xl">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-80 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
        <div class="p-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
          <h1 class="font-bold text-lg text-slate-900 dark:text-white">Messages</h1>
          <div class="flex items-center gap-2">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-300">🌙</button>
            <button id="closeSidebar" class="md:hidden p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">✕</button>
          </div>
        </div>
        <div class="p-3">
          <input id="convoSearch" placeholder="Search conversations" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-sm outline-none text-slate-900 dark:text-white placeholder-slate-400" />
        </div>
        <div id="convoList" class="flex-1 overflow-y-auto"></div>
      </aside>

      <!-- Chat area -->
      <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 min-w-0">
        <header class="p-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-3 bg-white dark:bg-slate-900">
          <button id="openSidebar" class="md:hidden p-2 -ml-2 text-slate-500">☰</button>
          <div class="relative">
            <img id="activeAvatar" class="w-10 h-10 rounded-full object-cover" />
            <span id="activeStatusDot" class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white dark:border-slate-900"></span>
          </div>
          <div class="min-w-0">
            <p id="activeName" class="font-semibold text-sm text-slate-900 dark:text-white truncate"></p>
            <p id="activeStatusText" class="text-xs text-slate-400"></p>
          </div>
        </header>

        <div id="messageArea" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

        <div id="typingIndicator" class="px-4 pb-1 hidden">
          <div class="inline-flex items-center gap-1 bg-slate-200 dark:bg-slate-800 rounded-full px-3 py-2">
            <span class="typing-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></span>
            <span class="typing-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></span>
            <span class="typing-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></span>
          </div>
        </div>

        <div class="p-3 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center gap-2">
          <button id="emojiBtn" class="p-2 text-xl rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">🙂</button>
          <input id="messageInput" placeholder="Type a message" class="flex-1 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-sm outline-none text-slate-900 dark:text-white placeholder-slate-400" />
          <button id="sendBtn" class="p-2.5 rounded-full bg-brand-600 text-white hover:bg-brand-700">➤</button>
        </div>
        <div id="emojiPicker" class="hidden absolute bottom-16 left-4 bg-white dark:bg-slate-800 rounded-xl shadow-xl p-2 grid grid-cols-6 gap-1 border border-slate-200 dark:border-slate-700"></div>
      </main>
    </div>

    <script>
      const conversations = [
        { id: 1, name: "Maya Chen", avatar: "https://i.pravatar.cc/80?img=47", online: true, messages: [
          { from: "them", text: "Hey! Did you check the new design?", time: "9:12 AM" },
          { from: "me", text: "Yes, looks great! Loving the new palette.", time: "9:14 AM", read: true },
          { from: "them", text: "Awesome, glad you like it 🎨", time: "9:15 AM" },
        ]},
        { id: 2, name: "Dev Team", avatar: "https://i.pravatar.cc/80?img=12", online: false, messages: [
          { from: "them", text: "Deploy is scheduled for 5pm", time: "Yesterday" },
          { from: "me", text: "Sounds good, I'll be around.", time: "Yesterday", read: true },
        ]},
        { id: 3, name: "Alex Rivera", avatar: "https://i.pravatar.cc/80?img=33", online: true, messages: [
          { from: "them", text: "Lunch tomorrow?", time: "Mon" },
          { from: "me", text: "Sure, 1pm?", time: "Mon", read: false },
        ]},
      ];

      let activeId = 1;
      const emojis = ["😀", "😂", "❤️", "👍", "🎉", "🔥", "😢", "😮", "🙏", "👏", "🚀", "✅"];

      const html = document.documentElement;
      document.getElementById("themeToggle").addEventListener("click", () => html.classList.toggle("dark"));
      applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
      function applyTheme(isDark) { html.classList.toggle("dark", isDark); }

      function renderConvoList(filter = "") {
        const list = document.getElementById("convoList");
        list.innerHTML = "";
        conversations
          .filter((c) => c.name.toLowerCase().includes(filter.toLowerCase()))
          .forEach((c) => {
            const last = c.messages[c.messages.length - 1];
            const row = document.createElement("button");
            row.className =
              "w-full flex items-center gap-3 p-3 text-left hover:bg-slate-50 dark:hover:bg-slate-800 " +
              (c.id === activeId ? "bg-slate-100 dark:bg-slate-800" : "");
            row.innerHTML = `
              <div class="relative shrink-0">
                <img src="${c.avatar}" class="w-11 h-11 rounded-full object-cover" />
                <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white dark:border-slate-900 ${c.online ? "bg-emerald-500" : "bg-slate-300"}"></span>
              </div>
              <div class="min-w-0 flex-1">
                <div class="flex justify-between items-baseline">
                  <p class="font-medium text-sm text-slate-900 dark:text-white truncate">${c.name}</p>
                  <span class="text-xs text-slate-400 shrink-0 ml-2">${last.time}</span>
                </div>
                <p class="text-xs text-slate-400 truncate">${last.from === "me" ? "You: " : ""}${last.text}</p>
              </div>
            `;
            row.addEventListener("click", () => {
              activeId = c.id;
              renderConvoList(document.getElementById("convoSearch").value);
              renderChat();
              document.getElementById("sidebar").classList.remove("flex");
              document.getElementById("sidebar").classList.add("hidden", "md:flex");
            });
            list.appendChild(row);
          });
      }

      function renderChat() {
        const convo = conversations.find((c) => c.id === activeId);
        document.getElementById("activeAvatar").src = convo.avatar;
        document.getElementById("activeName").textContent = convo.name;
        document.getElementById("activeStatusText").textContent = convo.online ? "Online" : "Offline";
        const dot = document.getElementById("activeStatusDot");
        dot.className = "absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white dark:border-slate-900 " + (convo.online ? "bg-emerald-500" : "bg-slate-300");

        const area = document.getElementById("messageArea");
        area.innerHTML = convo.messages
          .map((m) => {
            const mine = m.from === "me";
            return `
              <div class="bubble-in flex ${mine ? "justify-end" : "justify-start"}">
                <div class="max-w-[70%] ${mine ? "bg-brand-600 text-white" : "bg-white dark:bg-slate-800 text-slate-900 dark:text-white"} rounded-2xl px-4 py-2 shadow-sm">
                  <p class="text-sm">${m.text}</p>
                  <p class="text-[10px] mt-1 ${mine ? "text-white/70" : "text-slate-400"}">${m.time}${mine ? (m.read ? " · Read" : " · Sent") : ""}</p>
                </div>
              </div>
            `;
          })
          .join("");
        area.scrollTop = area.scrollHeight;
      }

      function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        const convo = conversations.find((c) => c.id === activeId);
        const time = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
        convo.messages.push({ from: "me", text, time, read: false });
        input.value = "";
        renderChat();
        renderConvoList(document.getElementById("convoSearch").value);

        document.getElementById("typingIndicator").classList.remove("hidden");
        setTimeout(() => {
          document.getElementById("typingIndicator").classList.add("hidden");
          convo.messages.push({ from: "them", text: "Got it, thanks!", time: new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) });
          renderChat();
          renderConvoList(document.getElementById("convoSearch").value);
        }, 1400);
      }

      document.getElementById("sendBtn").addEventListener("click", sendMessage);
      document.getElementById("messageInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
      document.getElementById("convoSearch").addEventListener("input", (e) => renderConvoList(e.target.value));

      const emojiPicker = document.getElementById("emojiPicker");
      emojiPicker.innerHTML = emojis.map((e) => `<button class="text-xl hover:scale-125 transition-transform">${e}</button>`).join("");
      emojiPicker.querySelectorAll("button").forEach((btn, i) => {
        btn.addEventListener("click", () => {
          document.getElementById("messageInput").value += emojis[i];
          emojiPicker.classList.add("hidden");
        });
      });
      document.getElementById("emojiBtn").addEventListener("click", () => emojiPicker.classList.toggle("hidden"));

      document.getElementById("openSidebar").addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("hidden");
        document.getElementById("sidebar").classList.add("flex", "absolute", "inset-y-0", "left-0", "z-10");
      });
      document.getElementById("closeSidebar").addEventListener("click", () => {
        document.getElementById("sidebar").classList.add("hidden");
      });

      renderConvoList();
      renderChat();
    </script>
  </body>
</html>
